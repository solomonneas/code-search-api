services:
  code-search-api:
    image: ghcr.io/solomonneas/code-search-api:latest
    container_name: code-search-api
    restart: unless-stopped
    ports:
      - "5204:5204"
    environment:
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      CODE_SEARCH_EMBED_MODEL: ${CODE_SEARCH_EMBED_MODEL:-qwen3-embedding:8b}
      CODE_SEARCH_SUMMARY_MODEL: ${CODE_SEARCH_SUMMARY_MODEL:-qwen3-coder-next:cloud}
      CODE_SEARCH_SUMMARY_FALLBACK: ${CODE_SEARCH_SUMMARY_FALLBACK:-qwen3-coder-next:cloud}
      CODE_SEARCH_API_KEY: ${CODE_SEARCH_API_KEY:-}
      CODE_SEARCH_CORS_ORIGINS: ${CODE_SEARCH_CORS_ORIGINS:-*}
      CODE_SEARCH_SUMMARY_WORKERS: ${CODE_SEARCH_SUMMARY_WORKERS:-4}
    volumes:
      # Persistent SQLite index
      - code-search-data:/data
      # Mount your code workspace read-only
      - ${CODE_SEARCH_WORKSPACE:-./repos}:/workspace:ro
    extra_hosts:
      # Lets the container reach Ollama running on the host (Linux)
      - "host.docker.internal:host-gateway"

volumes:
  code-search-data:
